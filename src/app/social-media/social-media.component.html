<div class="social-media" aria-label="Social media links">
    @for (social of socials; track social.link) {
        <a
                class="social-link"
                target="_blank"
                rel="noopener noreferrer"
                [href]="social.link"
                [attr.aria-label]="social.name"
                [attr.title]="social.name"
        >
            <img
                    [src]="social.imageUrl"
                    [alt]="social.name + ' icon'"
                    loading="lazy"
                    width="40"
                    height="40"
            >
        </a>
    }
</div>
